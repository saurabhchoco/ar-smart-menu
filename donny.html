<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DONNY - Alpha Energy</title>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:black;
  color:white;
  text-align:center;
}

.hero {
  padding:40px 20px;
}

h1 {
  font-size:32px;
  letter-spacing:3px;
}

.tag {
  color:#f5c542;
  margin-top:10px;
}

.btn {
  margin:10px;
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:white;
  color:black;
  font-weight:bold;
}

model-viewer {
  width:100%;
  height:350px;
}

.section {
  padding:30px 20px;
}

.hotspot {
  background:white;
  color:black;
  padding:10px;
  border-radius:12px;
  font-size:12px;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>DONNY ⚡</h1>
  <div class="tag">ALPHA ENERGY</div>

  <button class="btn" onclick="scrollToAR()">View in AR</button>
  <button class="btn">Buy Now</button>
</div>

<!-- 3D + AR -->
<model-viewer 
  id="viewer"
  src="donny.glb"
  ios-src="donny.usdz"
  ar
  ar-modes="webxr scene-viewer quick-look"
  auto-rotate
  camera-controls
  style="background:#111">

  <button slot="ar-button" class="btn">VIEW IN YOUR SPACE</button>

</model-viewer>

<!-- INGREDIENTS -->
<div class="section">
  <h2>What’s Inside ⚡</h2>

  <p>⚡ Caffeine — Instant Boost</p>
  <p>🔥 Taurine — Power Output</p>
  <p>💪 B Vitamins — Sustained Energy</p>
</div>

<!-- STORY -->
<div class="section">
  <h2>Why DONNY?</h2>
  <p>No crash. No nonsense. Just pure alpha energy.</p>
</div>

<!-- BUY -->
<div class="section">
  <h2>Choose Your Pack</h2>
  <button class="btn">₹99 Single</button>
  <button class="btn">₹499 Pack</button>
  <button class="btn">₹999 Monthly</button>
</div>

<script>
function scrollToAR() {
  document.getElementById('viewer').scrollIntoView({behavior:'smooth'});
}
</script>

</body>
</html>
