<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RanShX | Spatial Layout Designer</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* Live Camera Feed */
        #video-preview { position: fixed; top: 0; left: 0; min-width: 100%; min-height: 100%; z-index: 1; object-fit: cover; }

        /* UI Overlay */
        .overlay { position: fixed; z-index: 100; pointer-events: none; width: 100%; height: 100%; }
        .controls { pointer-events: auto; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }

        .inventory {
            pointer-events: auto; position: absolute; top: 20px; left: 0; width: 100%;
            display: flex; gap: 10px; padding: 10px; overflow-x: auto; background: rgba(0,0,0,0.5);
        }

        .item-thumb {
            min-width: 70px; height: 70px; background: #fff; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 10px;
            flex-direction: column; cursor: pointer; border: 2px solid transparent;
        }
        .item-thumb img { width: 40px; height: 40px; object-fit: contain; }

        /* Draggable Elements */
        .placed-item {
            position: absolute; z-index: 50; pointer-events: auto;
            cursor: move; transform: translate(-50%, -50%);
            touch-action: none; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
        }
        .placed-item img { width: 150px; height: auto; pointer-events: none; }

        .btn { background: #fff; color: #000; border: none; padding: 15px 25px; border-radius: 30px; font-weight: bold; }
    </style>
</head>
<body>

<video id="video-preview" autoplay playsinline></video>

<div class="overlay">
    <div class="inventory" id="inventory">
        </div>

    <div class="controls">
        <button class="btn" onclick="clearCanvas()">RESET ROOM</button>
        <button class="btn" style="background:#c5a059" onclick="captureLayout()">FINALIZE PLAN</button>
    </div>
</div>

<script>
    const inventory = [
        { name: "Counter", src: "https://cdn-icons-png.flaticon.com/512/2321/2321232.png" },
        { name: "Table", src: "https://cdn-icons-png.flaticon.com/512/1663/1663954.png" },
        { name: "Neon Wall", src: "https://cdn-icons-png.flaticon.com/512/1055/1055666.png" }
    ];

    // Initialize Camera
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('video-preview').srcObject = stream;
        } catch (err) {
            alert("Camera access required for Spatial Designing.");
        }
    }

    // Build Inventory
    const invEl = document.getElementById('inventory');
    inventory.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item-thumb';
        div.innerHTML = `<img src="${item.src}"><span>${item.name}</span>`;
        div.onclick = () => placeItem(item.src);
        invEl.appendChild(div);
    });

    function placeItem(src) {
        const item = document.createElement('div');
        item.className = 'placed-item';
        item.innerHTML = `<img src="${src}">`;
        
        // Initial Center Placement
        item.style.left = '50%';
        item.style.top = '50%';
        
        // Drag Logic
        let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

        item.addEventListener("touchstart", dragStart, false);
        item.addEventListener("touchend", dragEnd, false);
        item.addEventListener("touchmove", drag, false);

        function dragStart(e) {
            initialX = e.touches[0].clientX - xOffset;
            initialY = e.touches[0].clientY - yOffset;
            active = true;
        }
        function dragEnd() { active = false; }
        function drag(e) {
            if (active) {
                e.preventDefault();
                currentX = e.touches[0].clientX - initialX;
                currentY = e.touches[0].clientY - initialY;
                xOffset = currentX;
                yOffset = currentY;
                setTranslate(currentX, currentY, item);
            }
        }
        function setTranslate(xPos, yPos, el) {
            el.style.transform = `translate(calc(-50% + ${xPos}px), calc(-50% + ${yPos}px))`;
        }

        document.body.appendChild(item);
    }

    function clearCanvas() {
        document.querySelectorAll('.placed-item').forEach(el => el.remove());
    }

    function captureLayout() {
        alert("Spatial configuration saved to RanShX Global dashboard.");
    }

    startCamera();
</script>
</body>
</html>
