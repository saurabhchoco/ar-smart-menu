<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Interior | RanShX</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        :root { --primary: #000; --accent: #c5a059; --glass: rgba(255,255,255,0.8); }
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f4f7; padding-bottom: 100px; }
        
        header { padding: 30px; text-align: center; background: #fff; border-bottom: 1px solid #eee; }
        header h1 { font-weight: 200; font-size: 20px; letter-spacing: 4px; text-transform: uppercase; margin: 0; }
        
        .container { display: grid; gap: 25px; padding: 20px; max-width: 500px; margin: auto; }
        
        .card { 
            background: #fff; border-radius: 32px; overflow: hidden; 
            border: 1px solid #eee; box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            position: relative;
        }

        model-viewer { width: 100%; height: 350px; background: #fdfdfd; }

        .details { padding: 24px; }
        .type-tag { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .title { font-size: 19px; font-weight: 600; margin: 5px 0; }
        .specs { font-size: 13px; color: #777; margin-top: 8px; border-top: 1px solid #f9f9f9; padding-top: 12px; }

        .ar-btn { 
            background: var(--primary); color: #fff; border: none; padding: 14px 25px; 
            border-radius: 50px; font-weight: 600; position: absolute; bottom: 20px; 
            left: 50%; transform: translateX(-50%); font-size: 11px;
        }

        /* Admin Drawer */
        #admin { position: fixed; bottom: 0; width: 100%; background: #fff; z-index: 100; transform: translateY(85%); transition: 0.4s; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); }
        #admin.open { transform: translateY(0); }
        .handle { background: #000; color: #fff; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; font-size: 12px; letter-spacing: 1px; }
    </style>
</head>
<body>

<header><h1>Interior Fit-out</h1></header>

<div id="render-grid" class="container"></div>

<div id="admin">
    <div class="handle" onclick="document.getElementById('admin').classList.toggle('open')">PROJECT INVENTORY (CRUD)</div>
    <div style="padding: 20px; max-height: 60vh; overflow-y: auto;">
        <div id="admin-list"></div>
        <button onclick="addModule()" style="width:100%; padding:15px; background:var(--accent); color:#fff; border:none; border-radius:12px; font-weight:600;">+ Add Layout Module</button>
    </div>
</div>

<script>
    let modules = JSON.parse(localStorage.getItem('interiorData')) || [
        { id: 1, name: "Order Counter Module", type: "Front of House", dims: "2400mm x 900mm", src: "counter.glb" },
        { id: 2, name: "Kitchen Island Unit", type: "Back of House", dims: "1800mm x 750mm", src: "kitchen.glb" }
    ];

    function render() {
        const grid = document.getElementById('render-grid');
        const list = document.getElementById('admin-list');
        grid.innerHTML = ''; list.innerHTML = '';

        modules.forEach(m => {
            grid.innerHTML += `
                <div class="card">
                    <model-viewer src="${m.src}" ar ar-placement="floor" camera-controls disable-zoom shadow-intensity="1">
                        <button slot="ar-button" class="ar-btn">PLACE IN SPACE (1:1)</button>
                    </model-viewer>
                    <div class="details">
                        <span class="type-tag">${m.type}</span>
                        <div class="title">${m.name}</div>
                        <div class="specs">Footprint: ${m.dims}</div>
                    </div>
                </div>
            `;
            list.innerHTML += `
                <div style="display:flex; justify-content:space-between; padding: 12px 0; border-bottom: 1px solid #eee; align-items:center;">
                    <span style="font-size:14px;">${m.name}</span>
                    <button onclick="removeModule(${m.id})" style="color:red; background:none; border:none; font-weight:bold;">Remove</button>
                </div>
            `;
        });
        localStorage.setItem('interiorData', JSON.stringify(modules));
    }

    function addModule() {
        const name = prompt("Module Name:");
        const file = prompt("GLB Filename (ensure 1:1 scale):");
        if(name && file) {
            modules.push({ id: Date.now(), name: name, type: "Custom", dims: "Auto-scaled", src: file });
            render();
        }
    }

    function removeModule(id) {
        modules = modules.filter(m => m.id !== id);
        render();
    }

    render();
</script>
</body>
</html>
