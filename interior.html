<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Interior | RanShX</title>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

<style>
:root {
  --primary:#000;
  --accent:#c5a059;
}

body {
  margin:0;
  font-family:-apple-system, sans-serif;
  background:#f4f4f7;
}

/* HEADER */
header {
  text-align:center;
  padding:25px;
  background:#fff;
  border-bottom:1px solid #eee;
}
header h1 {
  font-size:18px;
  letter-spacing:3px;
  font-weight:300;
}

/* GRID */
.container {
  max-width:500px;
  margin:auto;
  padding:20px;
  display:grid;
  gap:20px;
}

/* CARD */
.card {
  background:#fff;
  border-radius:25px;
  overflow:hidden;
  box-shadow:0 15px 35px rgba(0,0,0,0.05);
  position:relative;
}

model-viewer {
  width:100%;
  height:300px;
  background:#fafafa;
}

.details {
  padding:20px;
}

.title {
  font-weight:600;
  font-size:16px;
}

.specs {
  font-size:13px;
  color:#777;
  margin-top:5px;
}

/* BUTTONS */
.btn {
  background:#000;
  color:#fff;
  border:none;
  padding:10px 15px;
  border-radius:20px;
  font-size:12px;
  margin-top:10px;
}

/* FLOATING LAYOUT BAR */
.layout-bar {
  position:fixed;
  bottom:80px;
  left:5%;
  width:90%;
  background:#fff;
  border-radius:20px;
  padding:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  z-index:50;
}

.layout-bar span {
  font-size:13px;
}

/* ADMIN */
#admin {
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  transform:translateY(85%);
  transition:0.4s;
  box-shadow:0 -10px 30px rgba(0,0,0,0.1);
}
#admin.open {
  transform:translateY(0);
}
.handle {
  background:#000;
  color:#fff;
  padding:12px;
  text-align:center;
  cursor:pointer;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<header>
  <h1>SMART INTERIOR</h1>
</header>

<div id="grid" class="container"></div>

<!-- LAYOUT BAR -->
<div class="layout-bar">
  <span id="layout-count">0 items</span> |
  <span id="layout-area">0 sqm</span>
  <br><br>
  <button class="btn" onclick="clearLayout()">Clear</button>
</div>

<!-- ADMIN PANEL -->
<div id="admin">
  <div class="handle" onclick="toggleAdmin()">ADMIN PANEL</div>
  <div style="padding:15px">

    <input id="name" placeholder="Module Name">
    <input id="dims" placeholder="Dimensions (e.g. 2000x1000)">
    <input id="src" placeholder="GLB file (e.g. counter.glb)">

    <button class="btn" onclick="addModule()">Add Module</button>

    <div id="admin-list"></div>

  </div>
</div>

<script>

/* DATA */
let modules = JSON.parse(localStorage.getItem('modules')) || [
  { id:1, name:"Counter", dims:"2400x900", src:"counter.glb" },
  { id:2, name:"Kitchen", dims:"1800x750", src:"kitchen.glb" }
];

let layout = JSON.parse(localStorage.getItem('layout')) || [];

/* RENDER */
function render() {
  const grid = document.getElementById('grid');
  const adminList = document.getElementById('admin-list');

  grid.innerHTML = '';
  adminList.innerHTML = '';

  modules.forEach(m => {

    grid.innerHTML += `
      <div class="card">
        <model-viewer src="${m.src}" ar ar-placement="floor" camera-controls></model-viewer>
        <div class="details">
          <div class="title">${m.name}</div>
          <div class="specs">${m.dims} mm</div>
          <button class="btn" onclick="addToLayout(${m.id})">Add to Layout</button>
        </div>
      </div>
    `;

    adminList.innerHTML += `
      <div style="display:flex; justify-content:space-between; margin-top:10px;">
        <span>${m.name}</span>
        <button onclick="deleteModule(${m.id})" style="color:red;border:none;background:none;">X</button>
      </div>
    `;
  });

  updateLayoutUI();

  localStorage.setItem('modules', JSON.stringify(modules));
}

/* LAYOUT */
function addToLayout(id) {
  const mod = modules.find(m => m.id === id);
  layout.push(mod);
  localStorage.setItem('layout', JSON.stringify(layout));
  updateLayoutUI();
}

function clearLayout() {
  layout = [];
  localStorage.setItem('layout', JSON.stringify(layout));
  updateLayoutUI();
}

/* AREA CALCULATION */
function updateLayoutUI() {
  document.getElementById('layout-count').innerText = layout.length + " items";

  let total = 0;

  layout.forEach(m => {
    let [w,h] = m.dims.split('x');
    total += (w*h)/1000000;
  });

  document.getElementById('layout-area').innerText = total.toFixed(2) + " sqm";
}

/* ADMIN */
function toggleAdmin() {
  document.getElementById('admin').classList.toggle('open');
}

function addModule() {
  const name = document.getElementById('name').value;
  const dims = document.getElementById('dims').value;
  const src = document.getElementById('src').value;

  if(name && dims && src) {
    modules.push({
      id:Date.now(),
      name,
      dims,
      src
    });
    render();
  }
}

function deleteModule(id) {
  modules = modules.filter(m => m.id !== id);
  render();
}

/* INIT */
render();

</script>

</body>
</html>
