<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RanShX | Multi-Object AR Designer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        :root { --primary: #000; --gold: #c5a059; }
        body { margin: 0; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Asset Selector Bar */
        .inventory-bar {
            position: fixed; top: 20px; left: 0; width: 100%;
            display: flex; gap: 15px; overflow-x: auto;
            padding: 10px 20px; z-index: 100;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }

        .inventory-item {
            min-width: 80px; height: 80px; background: #fff;
            border-radius: 15px; border: 2px solid transparent;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; cursor: pointer;
        }
        .inventory-item.active { border-color: var(--gold); transform: scale(1.1); }
        .inventory-item img { width: 40px; height: 40px; object-fit: contain; }

        /* The Main Viewport */
        #ar-engine { width: 100vw; height: 100vh; background: #eee; }

        .controls {
            position: fixed; bottom: 30px; width: 100%;
            display: flex; justify-content: center; gap: 20px; z-index: 100;
        }

        .btn {
            background: var(--primary); color: #fff; border: none;
            padding: 15px 30px; border-radius: 50px; font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="inventory-bar" id="inventory">
    <div class="inventory-item active" onclick="selectItem('counter', this)">
        <img src="https://cdn-icons-png.flaticon.com/512/2321/2321232.png">
        <span>COUNTER</span>
    </div>
    <div class="inventory-item" onclick="selectItem('table', this)">
        <img src="https://cdn-icons-png.flaticon.com/512/1663/1663954.png">
        <span>TABLE</span>
    </div>
    <div class="inventory-item" onclick="selectItem('branding', this)">
        <img src="https://cdn-icons-png.flaticon.com/512/1055/1055666.png">
        <span>LOGO</span>
    </div>
</div>

<model-viewer id="ar-viewer" 
              ar ar-placement="floor" 
              camera-controls 
              touch-action="none"
              src="base_plane.glb" 
              style="width: 100%; height: 100vh;">
    
    <div class="controls">
        <button class="btn" onclick="startAR()">ACTIVATE AR DESIGNER</button>
        <button class="btn" style="background:var(--gold)" onclick="saveLayout()">SAVE LAYOUT</button>
    </div>
</model-viewer>

<script>
    let selectedAsset = 'counter';

    function selectItem(type, el) {
        // UI feedback
        document.querySelectorAll('.inventory-item').forEach(item => item.classList.remove('active'));
        el.classList.add('active');
        selectedAsset = type;
        
        // Strategy: In a real-world scenario, you would update the 3D model 
        // that is about to be placed. For 2D images, we swap the texture.
        console.log("Ready to place:", selectedAsset);
    }

    function startAR() {
        const viewer = document.querySelector('#ar-viewer');
        viewer.activateAR();
    }

    // This listener detects where you tap in AR to drop an object
    document.querySelector('#ar-viewer').addEventListener('click', (event) => {
        if (document.querySelector('#ar-viewer').canActivateAR) {
            const viewer = document.querySelector('#ar-viewer');
            const hit = viewer.positionAndNormalFromPoint(event.clientX, event.clientY);
            
            if (hit) {
                console.log("Placing " + selectedAsset + " at: ", hit.position);
                // Here we would inject a new <a-plane> or 3D object into the scene
                // logic for multi-object persistence goes here
            }
        }
    });

    function saveLayout() {
        alert("Layout configurations (Coordinates & Assets) saved to RanShX Cloud.");
    }
</script>

</body>
</html>
