<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RanShX | Spatial Designer Pro</title>
    <script src="https://unpkg.com/interactjs/dist/interact.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #video-preview { position: fixed; top: 0; left: 0; min-width: 100%; min-height: 100%; z-index: 1; object-fit: cover; }
        
        .inventory {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
            display: flex; gap: 15px; padding: 15px; overflow-x: auto;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
        }

        .item-thumb {
            min-width: 90px; height: 100px; background: #fff; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; cursor: pointer; flex-shrink: 0;
        }
        .item-thumb img { width: 50px; height: 50px; object-fit: contain; margin-bottom: 5px; }

        .placed-item {
            position: absolute; z-index: 50; touch-action: none;
            user-select: none; display: inline-block;
        }
        .placed-item img { 
            width: 250px; /* Default starting size */
            display: block; 
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }

        .controls {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; gap: 15px;
        }
        .btn { padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<video id="video-preview" autoplay playsinline></video>

<div class="inventory" id="inventory"></div>

<div class="controls">
    <button class="btn" style="background:#fff;" onclick="location.reload()">CLEAR ALL</button>
    <button class="btn" style="background:#c5a059; color:#fff;" onclick="alert('Layout Saved')">SAVE PLAN</button>
</div>

<script>
    // High-Res Professional Assets (Placeholders - Swap with your Git links)
    const assets = [
        { name: "Counter", src: "https://i.ibb.co/vYf8m7y/counter-foh.png" },
        { name: "Neon Wall", src: "https://i.ibb.co/D8R5B8Z/neon-branding.png" },
        { name: "Bistro Table", src: "https://i.ibb.co/vX9Y6mY/table-set.png" },
        { name: "Booth", src: "https://i.ibb.co/fD7p5XW/seating-booth.png" }
    ];

    async function initCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video-preview').srcObject = stream;
    }

    const inv = document.getElementById('inventory');
    assets.forEach(asset => {
        const el = document.createElement('div');
        el.className = 'item-thumb';
        el.innerHTML = `<img src="${asset.src}"><span>${asset.name}</span>`;
        el.onclick = () => spawnItem(asset.src);
        inv.appendChild(el);
    });

    function spawnItem(src) {
        const container = document.createElement('div');
        container.className = 'placed-item';
        container.style.left = '100px';
        container.style.top = '200px';
        
        const img = document.createElement('img');
        img.src = src;
        container.appendChild(img);
        document.body.appendChild(container);

        // Interact.js logic for Drag, Resize, and Rotate
        let angle = 0;
        interact(container)
            .draggable({
                onmove: (event) => {
                    const target = event.target;
                    const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                    const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                    target.style.transform = `translate(${x}px, ${y}px) rotate(${angle}deg)`;
                    target.setAttribute('data-x', x);
                    target.setAttribute('data-y', y);
                }
            })
            .gesturable({
                onmove: (event) => {
                    angle += event.da;
                    const x = parseFloat(container.getAttribute('data-x')) || 0;
                    const y = parseFloat(container.getAttribute('data-y')) || 0;
                    const img = container.querySelector('img');
                    const currentWidth = img.clientWidth;
                    img.style.width = (currentWidth * (1 + event.ds / 50)) + 'px'; // Sensitive scaling
                    container.style.transform = `translate(${x}px, ${y}px) rotate(${angle}deg)`;
                }
            });
            
        // Double tap to remove
        container.addEventListener('dblclick', () => container.remove());
    }

    initCamera();
</script>
</body>
</html>
