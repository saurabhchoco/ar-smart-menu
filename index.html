<!DOCTYPE html>
<html>
<head>
    <title>Smart Menu POC</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body style="margin: 0; background: #fafafa;">

    <model-viewer 
        src="pizza.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        auto-rotate 
        style="width: 100%; height: 90vh;">
        
        <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; top: 16px; right: 16px; padding: 10px;">
            👋 View in your space
        </button>
    </model-viewer>

    <div style="text-align: center; font-family: sans-serif; padding: 10px;">
        <h2>Signature Dish</h2>
        <p>Freshly prepared - 100% Organic</p>
    </div>

</body>
</html>
