<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic AR Menu | Nutrient-Aware</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.75); --blur: blur(12px); }
        body { font-family: 'Inter', sans-serif; background: #fafafa; margin: 0; }
        
        /* High-end Frosted Glass Overlays */
        .hotspot {
            background: #fff; border-radius: 50%; width: 20px; height: 20px;
            border: 2px solid #000; box-shadow: 0 0 10px rgba(0,0,0,0.2);
            cursor: pointer; transition: transform 0.3s;
        }
        .hotspot:not([data-visible]) { opacity: 0; pointer-events: none; }
        .hotspot:hover { transform: scale(1.2); }

        .annotation {
            background: var(--glass); backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-radius: 12px; padding: 12px; border: 1px solid rgba(255,255,255,0.3);
            width: 150px; position: absolute; top: 30px; left: -65px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); font-size: 13px; line-height: 1.4;
        }

        /* Layout Styling */
        .menu-grid { padding: 20px; display: flex; flex-direction: column; gap: 40px; }
        model-viewer { width: 100%; height: 400px; border-radius: 20px; background: #eee; }
    </style>
</head>
<body>

<div class="menu-grid">
    <div class="card">
        <model-viewer id="sandwich" src="burger.glb" ar ar-modes="webxr scene-viewer" camera-controls shadow-intensity="1">
            
            <button class="hotspot" slot="hotspot-bread" data-position="0m 0.15m 0.05m" data-normal="0m 1m 0m">
                <div class="annotation">
                    <strong>Artisan Sourdough</strong><br>
                    <span>Gluten: High | 120 kcal<br>Stone-baked.</span>
                </div>
            </button>

            <button class="hotspot" slot="hotspot-avocado" data-position="0m 0.08m 0m" data-normal="0m 1m 0m">
                <div class="annotation">
                    <strong>Fresh Avocado</strong><br>
                    <span>Fats: Healthy | 80 kcal<br>Sourced from Mexico.</span>
                </div>
            </button>

            <button slot="ar-button" style="background: black; color: white; border: none; padding: 10px 20px; border-radius: 30px; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);">
                View in 3D Space
            </button>
        </model-viewer>
        <h2 style="text-align:center; font-weight: 300;">Signature Sandwich</h2>
    </div>
</div>

<script>
    // In WebXR mode (Android/Chrome 2026), this allows placing the same model multiple times 
    // to simulate a "set table" effect if the user taps multiple spots.
    const viewer = document.querySelector('#sandwich');
    viewer.addEventListener('ar-status', (event) => {
        if(event.detail.status === 'session-started') {
            console.log("Strategic Partner AR Session Active");
        }
    });
</script>

</body>
</html>
